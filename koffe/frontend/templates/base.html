<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Koffe{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <a href="/" class="logo">☕ koffe</a>
    <p class="tagline">Cafés de especialidad — Argentina</p>
    <nav class="header-nav">
      <a href="/explorar">Explorar →</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Koffe — datos actualizados diariamente desde sitios de tostadores</p>
  </footer>
  <div id="modal-container"></div>
  <script>
    function closeModal() {
      document.getElementById('modal-container').innerHTML = '';
      document.body.classList.remove('modal-open');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
    document.body.addEventListener('htmx:responseError', function(e) {
      console.error('HTMX error:', e.detail.xhr.status, e.detail.xhr.responseText);
    });
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id === 'modal-container' && e.detail.target.innerHTML.trim()) {
        document.body.classList.add('modal-open');
      }
    });
  </script>
</body>
</html>
