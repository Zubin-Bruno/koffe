<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Koffe{% endblock %}</title>
  <!-- Apply saved theme before render to avoid a flash of wrong colors -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- Google Fonts: Fraunces (display) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/static/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <a href="/" class="logo">Koffe</a>
    <nav class="header-nav">
      <a href="/explorar">Explorar</a>
    </nav>
    <!-- Theme toggle: dark roasted bean = dark mode, light roasted bean = light mode -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
      <!-- Dark roasted bean (shown when in dark mode) -->
      <svg id="bean-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <ellipse cx="12" cy="12" rx="6" ry="9" fill="#3a1a08"/>
        <path d="M12 3.5C9.5 6.5 9.5 10 12 12s2.5 5.5 0 8.5" stroke="#1a0a03" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <!-- Light roasted bean (shown when in light mode) -->
      <svg id="bean-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <ellipse cx="12" cy="12" rx="6" ry="9" fill="#c9a060"/>
        <path d="M12 3.5C9.5 6.5 9.5 10 12 12s2.5 5.5 0 8.5" stroke="#8a6030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </button>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>Koffe — datos actualizados diariamente desde sitios de tostadores</p>
  </footer>
  <script>
    // Theme toggle logic
    (function() {
      var btn = document.getElementById('theme-toggle');
      var beanDark  = document.getElementById('bean-dark');
      var beanLight = document.getElementById('bean-light');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        // dark mode → show dark bean; light mode → show light bean
        beanDark.style.display  = theme === 'dark'  ? 'block' : 'none';
        beanLight.style.display = theme === 'light' ? 'block' : 'none';
      }

      // Initialise icons based on the theme already set in <head>
      applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

      btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      });
    })();
  </script>
  <script>
  // ── Card expand animation ───────────────────────────────────
  (function () {
    'use strict';
    var activeOverlay = null;
    var activeBackdrop = null;
    var originRect = null;

    function isMobile() { return window.innerWidth <= 600; }

    function createBackdrop() {
      var bd = document.createElement('div');
      bd.className = 'card-backdrop';
      document.body.appendChild(bd);
      requestAnimationFrame(function () { bd.classList.add('is-visible'); });
      bd.addEventListener('click', closeExpanded);
      return bd;
    }

    function openExpanded(cardWrapper) {
      if (activeOverlay) return;  // prevent double-open
      var panel = cardWrapper.querySelector('.card-expanded');
      if (!panel) return;

      // FIRST: record where the card is on screen
      var rect = cardWrapper.getBoundingClientRect();
      originRect = rect;

      // Build the overlay div with the expanded panel content
      var overlay = document.createElement('div');
      overlay.className = 'exp-panel-overlay';
      overlay.innerHTML = panel.innerHTML;

      // INVERT: position overlay exactly at the card's current location
      overlay.style.cssText =
        'top:' + rect.top + 'px;' +
        'left:' + rect.left + 'px;' +
        'width:' + rect.width + 'px;' +
        'height:' + rect.height + 'px;' +
        'overflow:hidden;opacity:0.5;border-radius:12px;';

      document.body.appendChild(overlay);
      activeOverlay = overlay;
      activeBackdrop = createBackdrop();
      document.body.classList.add('card-expanded-open');

      // PLAY: double rAF ensures browser paints the initial state before transitioning
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          overlay.style.cssText = '';   // clear inline styles so CSS class takes over
          overlay.classList.add('is-expanded');
        });
      });

      // Wire close button
      var closeBtn = overlay.querySelector('.exp-close');
      if (closeBtn) closeBtn.addEventListener('click', closeExpanded);

      // Prevent buy-button click from closing panel
      var buyBtn = overlay.querySelector('.exp-buy-btn');
      if (buyBtn) buyBtn.addEventListener('click', function (e) { e.stopPropagation(); });
    }

    function closeExpanded() {
      if (!activeOverlay) return;
      var overlay = activeOverlay;
      var backdrop = activeBackdrop;
      activeOverlay = null;
      activeBackdrop = null;

      if (backdrop) backdrop.classList.remove('is-visible');

      overlay.classList.remove('is-expanded');
      overlay.classList.add('is-closing');

      if (!isMobile() && originRect) {
        overlay.style.top       = originRect.top + 'px';
        overlay.style.left      = originRect.left + 'px';
        overlay.style.width     = originRect.width + 'px';
        overlay.style.maxHeight = originRect.height + 'px';
        overlay.style.transform = 'none';
        overlay.style.opacity   = '0';
      } else {
        overlay.style.opacity = '0';
      }

      // Clean up after transition ends (500ms fallback if transitionend never fires)
      var cleaned = false;
      function cleanup() {
        if (cleaned) return; cleaned = true;
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        if (backdrop && backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
        document.body.classList.remove('card-expanded-open');
      }
      overlay.addEventListener('transitionend', cleanup, { once: true });
      setTimeout(cleanup, 500);
      originRect = null;
    }

    // Event delegation: works after HTMX partial reloads
    document.addEventListener('click', function (e) {
      if (activeOverlay) return;
      if (e.target.closest('.compare-overlay')) return;
      var wrapper = e.target.closest('.card-wrapper');
      if (!wrapper) return;
      if (e.target.closest('a') || e.target.closest('button')) return;
      e.preventDefault();
      openExpanded(wrapper);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && activeOverlay) closeExpanded();
    });

    // Keep HTMX error logger
    document.body.addEventListener('htmx:responseError', function (e) {
      console.error('HTMX error:', e.detail.xhr.status, e.detail.xhr.responseText);
    });
  })();
  </script>
  <script>
  // ── Comparison overlay ───────────────────────────────────────
  (function () {
    'use strict';
    var compareOverlay = null;
    var compareBackdrop = null;

    function isMobile() { return window.innerWidth <= 600; }

    function openCompare(prefillCoffeeId) {
      if (compareOverlay) return;

      // Close any open expanded panel first
      var existingExpanded = document.querySelector('.exp-panel-overlay.is-expanded');
      if (existingExpanded) {
        var closeBtn = existingExpanded.querySelector('.exp-close');
        if (closeBtn) closeBtn.click();
      }

      // Backdrop (reuse same class as card expand)
      var bd = document.createElement('div');
      bd.className = 'card-backdrop';
      document.body.appendChild(bd);
      requestAnimationFrame(function () { bd.classList.add('is-visible'); });
      bd.addEventListener('click', closeCompare);
      compareBackdrop = bd;

      // Build overlay structure
      var overlay = document.createElement('div');
      overlay.className = 'compare-overlay';

      // Header
      var header = document.createElement('div');
      header.className = 'compare-header';
      header.innerHTML = '<h2>Comparar cafes</h2>';
      var closeBtn = document.createElement('button');
      closeBtn.className = 'compare-close';
      closeBtn.setAttribute('aria-label', 'Cerrar');
      closeBtn.textContent = '\u2715';
      closeBtn.addEventListener('click', closeCompare);
      header.appendChild(closeBtn);
      overlay.appendChild(header);

      // Mobile tabs
      var tabs = document.createElement('div');
      tabs.className = 'compare-tabs';
      for (var t = 0; t < 2; t++) {
        var tabBtn = document.createElement('button');
        tabBtn.className = 'compare-tab-btn' + (t === 0 ? ' is-active' : '');
        tabBtn.textContent = 'Cafe ' + (t + 1);
        tabBtn.setAttribute('data-tab', t);
        tabBtn.addEventListener('click', (function (idx) {
          return function () { switchTab(idx); };
        })(t));
        tabs.appendChild(tabBtn);
      }
      overlay.appendChild(tabs);

      // Slots container
      var slotsContainer = document.createElement('div');
      slotsContainer.className = 'compare-slots';

      for (var s = 0; s < 2; s++) {
        var slot = document.createElement('div');
        slot.className = 'compare-slot' + (s === 0 ? ' is-active-tab' : '');
        slot.setAttribute('data-slot', s);

        // Decide what to load in this slot
        var url;
        if (prefillCoffeeId && s === 0) {
          url = '/coffees/' + prefillCoffeeId + '/compare-detail?slot=0';
        } else {
          url = '/coffees/compare-search?slot=' + s;
        }

        slot.setAttribute('hx-get', url);
        slot.setAttribute('hx-trigger', 'load');
        slot.setAttribute('hx-swap', 'innerHTML');
        slotsContainer.appendChild(slot);
      }

      overlay.appendChild(slotsContainer);
      document.body.appendChild(overlay);
      compareOverlay = overlay;
      document.body.classList.add('card-expanded-open');

      // Let HTMX process the new elements (triggers hx-trigger="load")
      htmx.process(overlay);

      // Animate in via double rAF
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          overlay.classList.add('is-open');
        });
      });
    }

    function closeCompare() {
      if (!compareOverlay) return;
      var overlay = compareOverlay;
      var backdrop = compareBackdrop;
      compareOverlay = null;
      compareBackdrop = null;

      if (backdrop) backdrop.classList.remove('is-visible');
      overlay.classList.remove('is-open');
      overlay.classList.add('is-closing');

      var cleaned = false;
      function cleanup() {
        if (cleaned) return; cleaned = true;
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        if (backdrop && backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
        document.body.classList.remove('card-expanded-open');
      }
      overlay.addEventListener('transitionend', cleanup, { once: true });
      setTimeout(cleanup, 500);
    }

    function switchTab(slotIndex) {
      if (!compareOverlay) return;
      var tabBtns = compareOverlay.querySelectorAll('.compare-tab-btn');
      var slots = compareOverlay.querySelectorAll('.compare-slot');
      tabBtns.forEach(function (btn, i) {
        btn.classList.toggle('is-active', i === slotIndex);
      });
      slots.forEach(function (slot, i) {
        slot.classList.toggle('is-active-tab', i === slotIndex);
      });
    }

    // Close on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && compareOverlay) closeCompare();
    });

    // Expose globally so buttons can call it
    window.openCompare = openCompare;
  })();
  </script>
</body>
</html>
