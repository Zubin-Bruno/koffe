{% extends "base.html" %}
{% block title %}Koffe — Explorar cafés{% endblock %}

{% block content %}
<section class="filters">
  <form
    hx-get="/coffees"
    hx-target="#results"
    hx-trigger="change, submit"
    hx-push-url="true"
    id="filter-form"
  >
    <div class="filter-row">

      <label>
        Tostador
        <select name="roaster_id">
          <option value="">Todos</option>
          {% for r in roasters %}
          <option value="{{ r.id }}" {% if filters.roaster_id|string == r.id|string %}selected{% endif %}>{{ r.name }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Origen
        <select name="origin">
          <option value="">Todos</option>
          {% for o in origins %}
          <option value="{{ o }}" {% if filters.origin == o %}selected{% endif %}>{{ o }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Proceso
        <select name="process">
          <option value="">Todos</option>
          {% for p in processes %}
          <option value="{{ p }}" {% if filters.process == p %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Acidez min.
        <select name="acidity" class="filter-narrow">
          <option value="">—</option>
          {% for i in range(1, 6) %}
          <option value="{{ i }}" {% if filters.acidity|string == i|string %}selected{% endif %}>{{ i }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Dulzor min.
        <select name="sweetness" class="filter-narrow">
          <option value="">—</option>
          {% for i in range(1, 6) %}
          <option value="{{ i }}" {% if filters.sweetness|string == i|string %}selected{% endif %}>{{ i }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        Cuerpo min.
        <select name="body" class="filter-narrow">
          <option value="">—</option>
          {% for i in range(1, 6) %}
          <option value="{{ i }}" {% if filters.body|string == i|string %}selected{% endif %}>{{ i }}</option>
          {% endfor %}
        </select>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="available_only" value="true"
          {% if filters.available_only %}checked{% endif %} />
        Solo disponibles
      </label>

    </div>
  </form>
</section>

<div id="results">
  {% include "coffee_cards.html" %}
</div>
{% endblock %}
